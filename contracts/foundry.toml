[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "ens-contracts/=lib/ens-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[fuzz]
runs = 1000
max_test_rejects = 100000
seed = '0x1'
failure_persist_dir = "test/fuzz-failures"
dictionary_weight = 80

[rpc_endpoints]
zg_mainnet = "${ZG_RPC_URL}"
zg_galileo = "${ZG_RPC_URL_TESTNET}"
sepolia = "${ENS_RPC_URL}"

[etherscan]
zg_mainnet = { key = "${ZG_EXPLORER_API_KEY}", url = "https://chainscan.0g.ai/api" }
zg_galileo = { key = "${ZG_EXPLORER_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }
